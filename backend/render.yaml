services:
  - type: web
    name: pixelforge-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      # Make sure to add your secret keys in the Render Dashboard:
      # REPLICATE_API_TOKEN, OPENAI_API_KEY, CLOUDINARY_CLOUD_NAME, etc.
